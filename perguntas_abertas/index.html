<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perguntas Abertas - Remo Engenharia</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=block" rel="stylesheet">
<style>
body { font-family: 'Inter', sans-serif; background-color: #f8f9ff; }
.material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
.likert-option:hover .likert-circle { border-color: #063482; background-color: #eef2ff; }
.likert-radio:checked + .likert-circle { background-color: #063482; border-color: #063482; box-shadow: 0 0 0 4px #d6e0ff; }
.likert-radio:checked + .likert-circle::after { content: ''; width: 8px; height: 8px; background: white; border-radius: 50%; }
.opcao-radio:checked ~ .opcao-caixa { border-color: #063482; background-color: #eef2ff; }
.opcao-radio:checked ~ .opcao-caixa .opcao-bolinha { border-color: #063482; }
.opcao-radio:checked ~ .opcao-caixa .opcao-bolinha::after { content: ''; display: block; width: 10px; height: 10px; margin: 3px; background: #063482; border-radius: 50%; }
.opcao-checkbox:checked ~ .opcao-caixa { border-color: #1FC272; background-color: #eafff3; }
.opcao-checkbox:checked ~ .opcao-caixa .opcao-quadrado { background-color: #1FC272; border-color: #1FC272; }
.opcao-checkbox:checked ~ .opcao-caixa .opcao-quadrado::after { content: ''; color: white; font-size: 14px; line-height: 1; }
</style>
</head>
<body class="text-[#0b1c30] min-h-screen flex flex-col">
<header class="w-full bg-white border-b border-gray-200 sticky top-0 z-10">
<div class="max-w-[720px] mx-auto px-6 py-4">
<div class="flex items-center justify-between mb-2">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-[#063482]">shield_with_heart</span>
<span class="font-bold text-lg text-[#063482]">Remo Engenharia</span>
</div>
<span class="text-sm font-semibold text-[#063482]">Etapa 14 de 14</span>
</div>
<div class="w-full h-2 bg-gray-200 rounded-full overflow-hidden">
<div class="h-full bg-[#1FC272] transition-all duration-500" style="width: 100%;"></div>
</div>
</div>
</header>

<main class="flex-grow max-w-[720px] mx-auto w-full px-6 py-8" id="conteudo-principal">
<h1 class="text-2xl font-bold text-[#063482] mb-2">Perguntas Abertas</h1>
<p class="text-gray-600 mb-6">Essas duas últimas perguntas são opcionais — mas sua opinião é muito bem-vinda.</p>
<div class="space-y-6">
<div class="bg-white border border-gray-200 rounded-xl p-5 shadow-sm">
<label class="block font-medium text-gray-800 mb-2">38. Na sua opinião, o que a REMO deveria fazer para se tornar um lugar ainda melhor para trabalhar?</label>
<textarea class="w-full border border-gray-300 rounded-lg px-3 py-2 min-h-[100px]" id="pergunta_38" placeholder="Sua opinião sincera ajuda a construir um futuro melhor..."></textarea>
</div>
<div class="bg-white border border-gray-200 rounded-xl p-5 shadow-sm">
<label class="block font-medium text-gray-800 mb-2">39. Gostaria de registrar alguma sugestão, reconhecimento ou comentário adicional?</label>
<textarea class="w-full border border-gray-300 rounded-lg px-3 py-2 min-h-[100px]" id="pergunta_39" placeholder="Espaço livre para elogios, críticas ou sugestões pontuais..."></textarea>
</div>
</div>
<div class="flex justify-between items-center gap-4 mt-8">
<button class="flex items-center gap-2 px-5 py-3 border-2 border-[#063482] text-[#063482] font-bold rounded-lg hover:bg-[#eef2ff] transition-all active:scale-95" id="btn-anterior" type="button">
<span class="material-symbols-outlined">arrow_back</span>
Anterior
</button>
<button class="flex items-center gap-2 px-6 py-3 bg-[#1FC272] text-white font-bold rounded-lg hover:opacity-90 shadow-md transition-all active:scale-95" id="btn-proxima" type="button">
Finalizar Pesquisa
<span class="material-symbols-outlined">check_circle</span>
</button>
</div>
<div class="hidden mt-4 px-4 py-3 rounded-lg text-sm font-medium" id="status-msg"></div>
</main>
<footer class="w-full py-6 bg-white border-t border-gray-200 mt-auto">
<div class="max-w-[720px] mx-auto px-6 text-center">
<p class="text-xs text-gray-500 mb-2">© 2026 Remo Engenharia. Sua participação é 100% anônima e segura.</p>
<div class="flex justify-center gap-4">
<a class="text-xs text-gray-500 hover:text-[#063482]" href="../suporte/index.html">Suporte</a>
<a class="text-xs text-gray-500 hover:text-[#063482]" href="../privacidade/index.html">Privacidade</a>
<a class="text-xs text-gray-500 hover:text-[#063482]" href="../termos-de-uso/index.html">Termos de Uso</a>
</div>
</div>
</footer>
<script src="../assets/sheetdb-connector.js"></script>
<script>
(function () {

    const btnProxima = document.getElementById('btn-proxima');
    const btnAnterior = document.getElementById('btn-anterior');
    const statusMsg = document.getElementById('status-msg');

    function mostrarStatus(msg, tipo) {
        statusMsg.textContent = msg;
        statusMsg.classList.remove('hidden', 'bg-red-100', 'text-red-700', 'bg-green-100', 'text-green-700');
        statusMsg.classList.add(tipo === 'erro' ? 'bg-red-100' : 'bg-green-100', tipo === 'erro' ? 'text-red-700' : 'text-green-700');
    }

    window.addEventListener('DOMContentLoaded', async () => {
        await reenviarPendentes();
        const salvo = await buscarRespostasSalvas();
        if (salvo && salvo.pergunta_38) document.getElementById('pergunta_38').value = salvo.pergunta_38;
        if (salvo && salvo.pergunta_39) document.getElementById('pergunta_39').value = salvo.pergunta_39;
    });

    btnProxima.addEventListener('click', async () => {
        btnProxima.disabled = true;
        const dados = {
            pergunta_38: document.getElementById('pergunta_38').value.trim(),
            pergunta_39: document.getElementById('pergunta_39').value.trim(),
        };
        try {
            if (typeof salvarRespostasEtapa !== 'function') {
                throw new Error('sheetdb-connector.js não carregou. Verifique a pasta "assets".');
            }
            const resultado = await salvarRespostasEtapa(dados);
            if (!resultado.ok) {
                mostrarStatus('Não foi possível salvar agora: ' + (resultado.error || 'erro desconhecido') + '. Suas respostas foram guardadas e serão reenviadas automaticamente.', 'erro');
                btnProxima.disabled = false;
                return;
            }
            localStorage.setItem('remo_clima_2026_concluido', 'true');
            document.getElementById('conteudo-principal').innerHTML = `
                <div class="flex flex-col items-center justify-center min-h-[50vh] text-center">
                    <span class="material-symbols-outlined text-[#1FC272] text-7xl mb-4" style="font-variation-settings: 'FILL' 1;">verified</span>
                    <h1 class="text-3xl font-bold text-[#063482] mb-2">Pesquisa concluída!</h1>
                    <p class="text-gray-600 max-w-sm">Obrigado por participar. Suas respostas são 100% anônimas e ajudam a Remo Engenharia a evoluir.</p>
                </div>
            `;
        } catch (err) {
            console.error(err);
            mostrarStatus('Erro inesperado: ' + err.message, 'erro');
            btnProxima.disabled = false;
        }
    });

    btnAnterior.addEventListener('click', () => window.location.href = '../fatores_motivacao/index.html');
})();
</script>
</body></html>
