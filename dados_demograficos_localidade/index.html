<script src="../assets/sheetdb-connector.js"></script>
<script>
(function () {

    const btnProxima = document.getElementById('btn-proxima');
    const btnAnterior = document.getElementById('btn-anterior');
    const statusMsg = document.getElementById('status-msg');

    function mostrarStatus(msg, tipo) {
        statusMsg.textContent = msg;
        statusMsg.classList.remove('hidden', 'bg-red-100', 'text-red-700', 'bg-green-100', 'text-green-700');
        statusMsg.classList.add(tipo === 'erro' ? 'bg-red-100' : 'bg-green-100', tipo === 'erro' ? 'text-red-700' : 'text-green-700');
    }

    const CAMPO = 'demog_localidade';

    window.addEventListener('DOMContentLoaded', async () => {
        await reenviarPendentes();
        const salvo = await buscarRespostasSalvas();
        if (salvo && salvo[CAMPO]) {
            const input = document.querySelector(`input[name="${CAMPO}"][value="${salvo[CAMPO]}"]`);
            if (input) input.checked = true;
        }
    });

    btnProxima.addEventListener('click', async () => {
        const marcado = document.querySelector(`input[name="${CAMPO}"]:checked`);
        if (!marcado) {
            mostrarStatus('Por favor, selecione uma opção antes de continuar.', 'erro');
            return;
        }
        btnProxima.disabled = true;
        try {
            if (typeof salvarRespostasEtapa !== 'function') {
                throw new Error('sheetdb-connector.js não carregou. Verifique a pasta "assets".');
            }
            const resultado = await salvarRespostasEtapa({ [CAMPO]: marcado.value });
            if (resultado.ok) {
                window.location.href = '../dados_demograficos_funcao/index.html';
                return;
            }
            mostrarStatus('Não foi possível salvar agora: ' + (resultado.error || 'erro desconhecido') + '. Suas respostas foram guardadas e serão reenviadas automaticamente.', 'erro');
        } catch (err) {
            console.error(err);
            mostrarStatus('Erro inesperado: ' + err.message, 'erro');
        } finally {
            btnProxima.disabled = false;
        }
    });

    btnAnterior.addEventListener('click', () => window.location.href = '../dados_demograficos_segmento/index.html');
})();
</script>
