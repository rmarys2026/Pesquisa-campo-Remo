<script>
(function () {

    const btnProxima = document.getElementById('btn-proxima');
    const btnAnterior = document.getElementById('btn-anterior');
    const statusMsg = document.getElementById('status-msg');

    function mostrarStatus(msg, tipo) {
        statusMsg.textContent = msg;
        statusMsg.classList.remove('hidden', 'bg-red-100', 'text-red-700', 'bg-green-100', 'text-green-700');
        statusMsg.classList.add(tipo === 'erro' ? 'bg-red-100' : 'bg-green-100', tipo === 'erro' ? 'text-red-700' : 'text-green-700');
    }

    const maxAllowed = 3;
    const checkboxes = document.querySelectorAll('[data-fator]');
    const outroInput = document.getElementById('fatores_motivacao_outro');

    checkboxes.forEach(cb => {
        cb.addEventListener('change', () => {
            const marcados = document.querySelectorAll('[data-fator]:checked').length;
            if (marcados > maxAllowed) cb.checked = false;
        });
    });

    window.addEventListener('DOMContentLoaded', async () => {
        await reenviarPendentes();
        const salvo = await buscarRespostasSalvas();
        if (salvo && salvo.fatores_motivacao) {
            salvo.fatores_motivacao.split(',').forEach(v => {
                const input = document.querySelector(`[data-fator][value="${v}"]`);
                if (input) input.checked = true;
            });
        }
        if (salvo && salvo.fatores_motivacao_outro) {
            outroInput.value = salvo.fatores_motivacao_outro;
        }
    });

    btnProxima.addEventListener('click', async () => {
        const marcados = Array.from(document.querySelectorAll('[data-fator]:checked')).map(i => i.value);
        if (marcados.length === 0 && !outroInput.value.trim()) {
            mostrarStatus('Por favor, selecione pelo menos um fator ou preencha o campo "Outro".', 'erro');
            return;
        }
        btnProxima.disabled = true;
        const dados = { fatores_motivacao: marcados.join(',') };
        if (outroInput.value.trim()) dados.fatores_motivacao_outro = outroInput.value.trim();
        try {
            if (typeof salvarRespostasEtapa !== 'function') {
                throw new Error('sheetdb-connector.js não carregou. Verifique a pasta "assets".');
            }
            const resultado = await salvarRespostasEtapa(dados);
            if (resultado.ok) {
                window.location.href = '../perguntas_abertas/index.html';
                return;
            }
            mostrarStatus('Não foi possível salvar agora: ' + (resultado.error || 'erro desconhecido') + '. Suas respostas foram guardadas e serão reenviadas automaticamente.', 'erro');
        } catch (err) {
            console.error(err);
            mostrarStatus('Erro inesperado: ' + err.message, 'erro');
        } finally {
            btnProxima.disabled = false;
        }
    });

    btnAnterior.addEventListener('click', () => window.location.href = '../enps/index.html');
})();
</script>
